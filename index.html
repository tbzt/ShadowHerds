<!DOCTYPE html>
<html lang="fr" data-edition="none">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Herds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&family=Oswald:wght@400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&family=Saira+Condensed:wght@500;600;700&family=Permanent+Marker&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=20">
  <link rel="stylesheet" href="css/theme-sr5.css?v=16">
  <link rel="stylesheet" href="css/theme-sr6.css?v=16">
  <link rel="stylesheet" href="css/theme-anarchy.css?v=16">
</head>

<body>

  <!-- ============================================================
     SÉLECTEUR D'ÉDITION
     ============================================================ -->
  <div id="edition-screen">
    <div class="edition-title">
      <span>Shadow Herds</span>
      Shadowrun
    </div>
    <div class="edition-cards">

      <div class="edition-card" data-ed="sr5" onclick="App.selectEdition('sr5')">
        <span class="ed-num">5</span>
        <span class="ed-name">Shadowrun</span>
        <span class="ed-sub">5e édition</span>
      </div>

      <div class="edition-card" data-ed="sr6" onclick="App.selectEdition('sr6')">
        <span class="ed-num">6</span>
        <span class="ed-name">Shadowrun</span>
        <span class="ed-sub">6e édition</span>
      </div>

      <div class="edition-card" data-ed="anarchy" onclick="App.selectEdition('anarchy')">
        <span class="ed-num">∅</span>
        <span class="ed-name">Anarchy</span>
        <span class="ed-sub">2e édition</span>
      </div>

    </div>
  </div>

  <!-- ============================================================
     APPLICATION PRINCIPALE
     ============================================================ -->
  <div id="app">

    <!-- TOP BAR -->
    <div id="topbar">
      <span class="topbar-logo" onclick="App.goHome()" title="Accueil">Shadow Herds</span>
      <button class="topbar-edition-badge" id="edition-badge" onclick="App.changeEdition()"
        title="Changer d'édition">—</button>

      <div id="dice-roller">
        <div class="dice-count-group">
          <button class="dice-count-step" data-dice-topbar-step="-1" tabindex="-1"
            aria-label="Moins de dés">−</button>
          <input class="dice-count-input" type="number" id="dice-count" value="6" min="1" max="40"
            aria-label="Nombre de dés">
          <button class="dice-count-step" data-dice-topbar-step="1" tabindex="-1"
            aria-label="Plus de dés">＋</button>
        </div>
        <button class="dice-roll-btn" id="dice-roll-btn"><span class="dice-roll-icon">⚄</span>Lancer</button>
        <span id="dice-result" aria-live="polite"></span>
      </div>

      <button class="dice-log-toggle" id="dice-log-btn" onclick="DiceLog.toggle()"
        title="Journal des jets" aria-label="Journal des jets">≣</button>

      <span class="topbar-spacer"></span>
    </div>

    <!-- CORPS -->
    <div id="main-body">

      <!-- SIDEBAR -->
      <nav id="sidebar" aria-label="Navigation principale">
        <span class="nav-section-label">Gestion</span>
        <button class="nav-btn active" data-panel="welcome" onclick="App.showPanel('welcome')">
          <span class="nav-icon">⌂</span><span class="nav-label">Accueil</span>
        </button>
        <button class="nav-btn" data-panel="shadows" onclick="App.showPanel('shadows')">
          <span class="nav-icon">◈</span><span class="nav-label" data-short="Ombres">Ombres portées</span>
        </button>
        <button class="nav-btn" data-panel="generator" onclick="App.showPanel('generator')">
          <span class="nav-icon">⊕</span><span class="nav-label" data-short="PNJ">Générateur PNJ</span>
        </button>

        <span class="nav-section-label">Outils</span>
        <button class="nav-btn" data-panel="contacts" onclick="App.showPanel('contacts')">
          <span class="nav-icon">◉</span><span class="nav-label">Contacts</span>
        </button>
        <button class="nav-btn" data-panel="run" onclick="App.showPanel('run')">
          <span class="nav-icon">▶</span><span class="nav-label">Run</span>
        </button>

        <span class="nav-section-label">Système</span>
        <button class="nav-btn" data-panel="settings" onclick="App.showPanel('settings')">
          <span class="nav-icon">⚙</span><span class="nav-label" data-short="Réglages">Paramètres</span>
        </button>
      </nav>

      <!-- CONTENU PRINCIPAL -->
      <main id="content">

        <!-- ACCUEIL -->
        <div class="panel active" id="panel-welcome">
          <div class="panel-title" id="welcome-title">Bienvenue</div>
          <div class="welcome-card" id="welcome-body"></div>
        </div>

        <!-- OMBRES PORTÉES -->
        <div class="panel" id="panel-shadows">
          <div class="panel-title">Ombres portées</div>
          <div class="shadows-layout" data-sidebar="shadows">
            <div class="sidebar-backdrop" onclick="SidebarToggle.close('shadows')"></div>
            <!-- Rail de réouverture (visible quand repliée) -->
            <button class="sidebar-reopen" onclick="SidebarToggle.open('shadows')" title="Afficher les groupes"
              aria-label="Afficher les groupes">
              <span class="sidebar-reopen-icon">›</span>
              <span class="sidebar-reopen-label">Groupes</span>
            </button>
            <!-- Colonne gauche : groupes -->
            <aside class="shadows-sidebar">
              <div class="shadows-sidebar-header">
                <button class="sidebar-collapse-btn" onclick="SidebarToggle.close('shadows')" title="Replier"
                  aria-label="Replier les groupes">‹</button>
                <span class="shadows-sidebar-title">Groupes</span>
                <button class="btn-icon" onclick="Shadows.addGroup()" title="Nouveau groupe">＋</button>
              </div>
              <div id="shadows-group-list"></div>
            </aside>
            <!-- Zone principale : grille de cards -->
            <div class="shadows-main">
              <div class="shadows-main-toolbar">
                <span id="shadows-group-label" class="shadows-group-label">Tous les figurants</span>
                <button class="btn-secondary btn-small" onclick="Shadows.saveAllVisible()">Sauvegarder tout dans le
                  groupe</button>
                <button class="btn-secondary btn-small" onclick="Backup.export()" title="Exporter tous les PNJ et contacts (toutes éditions)">⤓ Exporter</button>
                <button class="btn-secondary btn-small" onclick="Backup.openImportDialog()" title="Importer depuis un fichier ou une URL">⤒ Importer</button>
                <input class="grid-filter" type="search" placeholder="Filtrer…"
                  aria-label="Filtrer les figurants" oninput="Shadows.setFilter(this.value)">
              </div>
              <div class="cards-zone" id="shadows-grid"></div>
            </div>
          </div>
        </div>

        <!-- GÉNÉRATEUR PNJ -->
        <div class="panel" id="panel-generator">
          <div class="panel-title">Générateur de PNJ</div>

          <div class="tab-bar">
            <button class="tab-btn active" onclick="Gen.showTab('single', this)">PNJ individuel</button>
            <button class="tab-btn" onclick="Gen.showTab('group', this)">Groupe / bande</button>
          </div>

          <!-- Onglet individuel -->
          <div class="tab-panel active" id="gen-tab-single">
            <div class="gen-form" id="gen-form-single"></div>
            <div class="gen-actions">
              <button class="btn-primary" onclick="Gen.generateSingle()">Générer</button>
              <button class="btn-secondary" onclick="Gen.clearSingle()">Effacer</button>
            </div>
            <div class="cards-zone" id="gen-zone-single"></div>
          </div>

          <!-- Onglet groupe -->
          <div class="tab-panel" id="gen-tab-group">
            <div class="gen-form" id="gen-form-group"></div>
            <div class="gen-actions">
              <button class="btn-primary" onclick="Gen.generateGroup()">Générer le groupe</button>
              <button class="btn-secondary" onclick="Gen.clearGroup()">Effacer</button>
            </div>
            <div class="cards-zone" id="gen-zone-group"></div>
          </div>
        </div>

        <!-- CONTACTS -->
        <div class="panel" id="panel-contacts">
          <div class="panel-title">Contacts</div>
          <div class="shadows-layout" data-sidebar="contacts">
            <div class="sidebar-backdrop" onclick="SidebarToggle.close('contacts')"></div>
            <button class="sidebar-reopen" onclick="SidebarToggle.open('contacts')" title="Afficher les groupes"
              aria-label="Afficher les groupes">
              <span class="sidebar-reopen-icon">›</span>
              <span class="sidebar-reopen-label">Groupes</span>
            </button>
            <aside class="shadows-sidebar">
              <div class="shadows-sidebar-header">
                <button class="sidebar-collapse-btn" onclick="SidebarToggle.close('contacts')" title="Replier"
                  aria-label="Replier les groupes">‹</button>
                <span class="shadows-sidebar-title">Groupes</span>
                <button class="btn-icon" onclick="ContactsBook.addGroup()" title="Nouveau groupe">＋</button>
              </div>
              <div id="contacts-group-list"></div>
            </aside>
            <div class="shadows-main">
              <div class="contacts-gen-bar">
                <div id="contact-gen-form"></div>
                <div class="shadows-main-toolbar">
                  <button class="btn-primary btn-small" onclick="ContactsBook.generate()">Générer un contact</button>
                  <span id="contacts-group-label" class="shadows-group-label">Tous les contacts</span>
                  <input class="grid-filter" type="search" placeholder="Filtrer…"
                    aria-label="Filtrer les contacts" oninput="ContactsBook.setFilter(this.value)">
                </div>
              </div>
              <div class="cards-zone" id="contacts-grid"></div>
            </div>
          </div>
        </div>

        <!-- RUN -->
        <div class="panel" id="panel-run">
          <div class="panel-title">Générateur de run</div>
          <div id="run-panel-content"></div>
        </div>

        <!-- PARAMÈTRES -->
        <div class="panel" id="panel-settings">
          <div class="panel-title">Paramètres</div>
          <div id="settings-panel-content"></div>
        </div>

      </main>
    </div>

    <!-- BARRE DE NAVIGATION MOBILE -->
    <nav id="bottom-nav" aria-label="Navigation mobile">
      <button class="bnav-btn" data-panel="shadows" onclick="App.showPanel('shadows')">
        <span class="bnav-icon">◈</span><span class="bnav-label">Ombres</span>
      </button>
      <button class="bnav-btn" data-panel="generator" onclick="App.showPanel('generator')">
        <span class="bnav-icon">⊕</span><span class="bnav-label">PNJ</span>
      </button>
      <button class="bnav-btn" data-panel="contacts" onclick="App.showPanel('contacts')">
        <span class="bnav-icon">◉</span><span class="bnav-label">Contacts</span>
      </button>
      <button class="bnav-btn" data-panel="run" onclick="App.showPanel('run')">
        <span class="bnav-icon">▶</span><span class="bnav-label">Run</span>
      </button>
      <button class="bnav-btn" data-panel="settings" onclick="App.showPanel('settings')">
        <span class="bnav-icon">⚙</span><span class="bnav-label">Réglages</span>
      </button>
    </nav>

    <!-- LANCEUR DE DÉS MOBILE : FAB + BOTTOM SHEET -->
    <button id="dice-fab" onclick="DicePanel.open()" aria-label="Lancer les dés">⚄</button>
    <div id="dice-sheet-overlay" role="dialog" aria-modal="true" aria-label="Lanceur de dés">
      <div id="dice-sheet">
        <div class="dice-sheet-handle"></div>
        <div class="dice-sheet-counter">
          <button class="dice-sheet-step" data-dice-step="-1" aria-label="Moins de dés">−</button>
          <span id="dice-sheet-count" aria-live="polite">6</span>
          <button class="dice-sheet-step" data-dice-step="1" aria-label="Plus de dés">＋</button>
        </div>
        <button class="dice-sheet-roll" onclick="DicePanel.roll()">Lancer</button>
        <button class="dice-sheet-log" onclick="DiceLog.open()">Journal des jets</button>
      </div>
    </div>
  </div>

  <!-- MODAL ÉDITION AVANCÉE -->
  <div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-label">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title-label">Édition avancée</span>
        <button class="modal-close" onclick="EditModal.close()" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-form-body"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="EditModal.close()">Annuler</button>
        <button class="btn-primary" onclick="EditModal.save()">Sauvegarder</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- SCRIPTS — ordre important : utils → storage → éditions → ui → modules → app -->
  <script src="js/utils.js?v=18"></script>
  <script src="js/storage.js?v=16"></script>
  <script src="js/metavariants.js?v=17"></script>
  <script src="js/infected.js?v=21"></script>
  <script src="js/skillcatalog.js?v=16"></script>
  <script src="js/weaponroll.js?v=18"></script>
  <script src="js/bonusengine.js?v=22"></script>
  <script src="js/flavor.js?v=16"></script>
  <script src="js/content.js?v=20"></script>
  <script src="js/magic.js?v=5"></script>
  <script src="js/editions/sr5.js?v=24"></script>
  <script src="js/editions/sr6.js?v=22"></script>
  <script src="js/editions/anarchy.js?v=21"></script>
  <script src="js/drugs.js?v=1"></script>
  <script src="js/vehicles.js?v=2"></script>
  <script src="js/ui.js?v=24"></script>
  <script src="js/dicepanel.js?v=3"></script>
  <script src="js/sidebartoggle.js?v=16"></script>
  <script src="js/profcategories.js?v=16"></script>
  <script src="js/multiselect.js?v=16"></script>
  <script src="js/generator.js?v=19"></script>
  <script src="js/shadows.js?v=19"></script>
  <script src="js/editmodal.js?v=17"></script>
  <script src="js/extras.js?v=18"></script>
  <script src="js/contactgen.js?v=16"></script>
  <script src="js/settings.js?v=17"></script>
  <script src="js/backup.js?v=16"></script>
  <script src="js/app.js?v=17"></script>

</body>

</html>
